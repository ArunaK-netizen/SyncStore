name: Deploy PartTime App

on:
  push:
    branches:
      - main
  workflow_dispatch: # Manual trigger for full APK build

jobs:
  build:
    name: Build Production APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build with EAS
        run: eas build --platform android --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EAS_TOKEN }}

      - name: Download APK artifact
        run: |
          mkdir -p ./artifacts
          echo "Downloading latest production build artifact..."
          eas build:download --platform android --profile production --non-interactive --output ./artifacts/app.apk
        env:
          EXPO_TOKEN: ${{ secrets.EAS_TOKEN }}

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: parttime-release
          path: ./mobile/artifacts/

      - name: Release APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Release Build
          draft: false
          prerelease: false
          files: ./mobile/artifacts/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
